{% extends "base.html" %}



{% block content %}



<div class="battle">



<div class="monster-card">


<h2>
Your {{player.name}}
</h2>


<p>
HP:
{{player.hp}}
</p>


<p>
Attack:
{{player.attack}}
</p>


</div>




<h1>
VS
</h1>




<div class="monster-card enemy">


<h2>
Wild {{enemy.name}}
</h2>


<p>

HP:
{{enemy.hp}}

</p>


<p>

Attack:
{{enemy.attack}}

</p>


</div>



</div>




<h1>

{{winner}}

</h1>



<a class="button"
href="/team">

Back to Team

</a>



{% endblock %}
